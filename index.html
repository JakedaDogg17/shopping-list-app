<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --muted: #86868b;
    --accent: #0071e3;
    --danger: #ff3b30;
    --border: #e5e5e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #f5f5f7;
      --muted: #98989d;
      --border: #3a3a3c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .app {
    width: 100%;
    max-width: 420px;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 20px;
    text-align: center;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
  }
  .add-btn {
    padding: 12px 18px;
    background: var(--accent);
    color: #fff;
  }
  .add-btn:active {
    opacity: 0.8;
  }
  ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  li {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
  }
  li.checked .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .checkbox {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.8rem;
  }
  li.checked .checkbox {
    background: var(--accent);
  }
  .item-text {
    flex: 1;
    word-break: break-word;
  }
  .delete-btn {
    background: transparent;
    color: var(--danger);
    font-size: 1.3rem;
    line-height: 1;
    padding: 4px 8px;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px 0;
  }
  .footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .clear-checked {
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    text-decoration: underline;
    padding: 4px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <form class="input-row" id="addForm">
      <input type="text" id="itemInput" placeholder="아이템 추가..." autocomplete="off" />
      <button type="submit" class="add-btn">추가</button>
    </form>
    <ul id="list"></ul>
    <div class="empty" id="emptyMsg" style="display:none;">목록이 비어 있습니다</div>
    <div class="footer">
      <span id="countMsg"></span>
      <button class="clear-checked" id="clearChecked" style="display:none;">체크된 항목 지우기</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = "shopping-list-items";
  const listEl = document.getElementById("list");
  const emptyMsg = document.getElementById("emptyMsg");
  const countMsg = document.getElementById("countMsg");
  const clearCheckedBtn = document.getElementById("clearChecked");
  const form = document.getElementById("addForm");
  const input = document.getElementById("itemInput");

  let items = loadItems();

  function loadItems() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveItems() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    listEl.innerHTML = "";
    items.forEach((item) => {
      const li = document.createElement("li");
      li.className = item.checked ? "checked" : "";

      const checkbox = document.createElement("button");
      checkbox.type = "button";
      checkbox.className = "checkbox";
      checkbox.textContent = item.checked ? "✓" : "";
      checkbox.addEventListener("click", () => toggleItem(item.id));

      const text = document.createElement("span");
      text.className = "item-text";
      text.textContent = item.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "×";
      deleteBtn.addEventListener("click", () => deleteItem(item.id));

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(deleteBtn);
      listEl.appendChild(li);
    });

    emptyMsg.style.display = items.length === 0 ? "block" : "none";

    const checkedCount = items.filter((i) => i.checked).length;
    countMsg.textContent = items.length
      ? `전체 ${items.length}개 · 완료 ${checkedCount}개`
      : "";
    clearCheckedBtn.style.display = checkedCount > 0 ? "inline" : "none";
  }

  function addItem(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    items.push({ id: Date.now() + Math.random(), text: trimmed, checked: false });
    saveItems();
    render();
  }

  function toggleItem(id) {
    items = items.map((i) => (i.id === id ? { ...i, checked: !i.checked } : i));
    saveItems();
    render();
  }

  function deleteItem(id) {
    items = items.filter((i) => i.id !== id);
    saveItems();
    render();
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    addItem(input.value);
    input.value = "";
    input.focus();
  });

  clearCheckedBtn.addEventListener("click", () => {
    items = items.filter((i) => !i.checked);
    saveItems();
    render();
  });

  render();
</script>
</body>
</html>
